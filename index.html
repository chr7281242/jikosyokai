<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiharu Ota - Portfolio</title>
    <style>
        /* 全体のスタイル */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
        }

        /* コンテナ */
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 40px;
            background: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-radius: 12px;
        }

        /* ヘッダー部分 */
        header {
            text-align: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 30px;
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 0.1em;
            color: #2c3e50;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 1rem;
            margin-top: 10px;
        }

        /* セクション共通 */
        section {
            margin-bottom: 40px;
        }

        h2 {
            font-size: 1.2rem;
            border-left: 4px solid #2c3e50;
            padding-left: 15px;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        /* 自己紹介テキスト */
        .profile-text {
            font-size: 1rem;
            color: #555;
        }

        /* リストスタイル */
        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        li span {
            font-weight: bold;
            width: 100px;
            color: #7f8c8d;
        }

        /* フッター */
        footer {
            text-align: center;
            font-size: 0.8rem;
            color: #bdc3c7;
            margin-top: 50px;
        }

        /* レスポンシブ対応 */
        @media (max-width: 600px) {
            .container {
                margin: 20px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>太田 千晴</h1>
        <p class="subtitle">Chiharu Ota</p>
    </header>

    <section>
        <h2>About Me</h2>
        <div class="profile-text">
            <p>
                こんにちは、太田千晴です。こちらのページをご覧いただきありがとうございます。<br>
                ここに自分のモットーや、現在取り組んでいること、大切にしている価値観などを記入してください。
            </p>
        </div>
    </section>

    <section>
        <h2>Details</h2>
        <ul>
            <li><span>出身地</span> 〇〇県</li>
            <li><span>趣味</span> 読書、映画鑑賞、散歩</li>
            <li><span>スキル</span> HTML, CSS, コミュニケーション</li>
        </ul>
    </section>

    <section>
        <h2>Links</h2>
        <p>SNSやブログへのリンクをここに配置できます。</p>
        <a href="#" style="color: #3498db; text-decoration: none;">Twitter / X</a> &nbsp;
        <a href="#" style="color: #3498db; text-decoration: none;">GitHub</a>
    </section>

    <footer>
        &copy; 2026 Chiharu Ota
    </footer>
</div>

</html>
